services:
  lyranest-community-server:
    image: lyranest-community-server:1.0.0
    container_name: lyranest-community-server
    restart: unless-stopped
    mem_limit: "256m"
    mem_reservation: "128m"
    environment:
      SERVER_ADDR: ":8080"
      MUSIC_LIBRARY_DIR: /music
      MUSIC_DATA_DIR: /data
      GOMEMLIMIT: "192MiB"
      GOGC: "100"
      LOG_LEVEL: "info"
      SHUTDOWN_TIMEOUT: "10s"
      AUTH_SESSION_TTL: "24h"
    ports:
      - "18080:8080"
    volumes:
      - "/vol1/1000/lyranest-community/music:/music:ro"
      - "/vol1/1000/lyranest-community/data:/data:rw"
    healthcheck:
      test: ["CMD", "/usr/local/bin/music-player-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
