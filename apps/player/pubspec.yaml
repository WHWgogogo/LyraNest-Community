name: player
description: Flutter client for LyraNest Community.
publish_to: "none"
version: 1.0.1+101

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  crypto: ^3.0.7
  dio: ^5.7.0
  file_selector: ^1.1.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.20.2
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/support/
