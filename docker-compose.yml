services:
  lyranest-community-server:
    build:
      # Community edition server source directory.
      context: "${SERVER_BUILD_CONTEXT:-./server}"
      dockerfile: "${SERVER_DOCKERFILE:-Dockerfile}"
    image: lyranest-community-server:${SERVER_IMAGE_TAG:-1.0.0}
    container_name: lyranest-community-server
    restart: unless-stopped
    mem_limit: "${SERVER_MEMORY_LIMIT:-256m}"
    mem_reservation: "${SERVER_MEMORY_RESERVATION:-128m}"
    environment:
      # Container listen address. Usually no need to change.
      SERVER_ADDR: ":8080"
      # Paths inside the container. Change host paths in volumes below instead.
      MUSIC_LIBRARY_DIR: /music
      MUSIC_DATA_DIR: /data
      # Go runtime memory tuning for small NAS/VM deployments.
      GOMEMLIMIT: "${GOMEMLIMIT:-192MiB}"
      GOGC: "${GOGC:-100}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      SHUTDOWN_TIMEOUT: "${SHUTDOWN_TIMEOUT:-10s}"
      AUTH_SESSION_TTL: "${AUTH_SESSION_TTL:-24h}"
    ports:
      # Change SERVER_PORT to expose another host port, for example 18080:8080.
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Change MUSIC_LIBRARY_HOST_DIR to your host music folder.
      # LyraNest Community needs read access for playback and scan metadata.
      - "${MUSIC_LIBRARY_HOST_DIR:-./music}:/music:ro"
      # DATA_DIR stores users, sessions, favorites, playlists and scan index.
      - "${DATA_DIR:-./data}:/data:rw"
    healthcheck:
      test: ["CMD", "/usr/local/bin/music-player-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
